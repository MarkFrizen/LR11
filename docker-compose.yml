version: "3.8"

services:
  python-fastapi:
    build:
      context: ./services/python-fastapi
      dockerfile: Dockerfile
    container_name: python-fastapi
    ports:
      - "8000:8000"
    depends_on:
      - go-gin
      - rust-actix
    networks:
      - app-network
    restart: unless-stopped

  go-gin:
    build:
      context: ./services/go-gin
      dockerfile: Dockerfile
    container_name: go-gin
    networks:
      - app-network
    restart: unless-stopped

  rust-actix:
    build:
      context: ./services/rust-actix
      dockerfile: Dockerfile
    container_name: rust-actix
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge
