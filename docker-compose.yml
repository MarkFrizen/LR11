version: "3.8"

services:
  go-gin:
    build:
      context: ./services/go-gin
      dockerfile: Dockerfile
    container_name: go-gin
    network_mode: host
    environment:
      - GIN_MODE=release
    restart: unless-stopped

  rust-actix:
    build:
      context: ./services/rust-actix
      dockerfile: Dockerfile
    container_name: rust-actix
    network_mode: host
    restart: unless-stopped

  python-fastapi:
    build:
      context: ./services/python-fastapi
      dockerfile: Dockerfile
    container_name: python-fastapi
    network_mode: host
    depends_on:
      - go-gin
      - rust-actix
    restart: unless-stopped
